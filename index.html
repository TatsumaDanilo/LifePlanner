
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Thumb-Right Planner</title>
    <script>
        // Prevent libraries from trying to overwrite fetch and crashing
        const originalFetch = window.fetch;
        try {
            Object.defineProperty(window, 'fetch', {
                configurable: true,
                enumerable: true,
                get: () => originalFetch,
                set: (val) => {
                    // Ignore attempt to overwrite window.fetch
                }
            });
            Object.defineProperty(globalThis, 'fetch', {
                configurable: true,
                enumerable: true,
                get: () => originalFetch,
                set: (val) => {
                    // Ignore attempt to overwrite globalThis.fetch
                }
            });
        } catch (e) {
            // Ignore
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .liquid-blur {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .mask-fade-edges {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .color-scheme-dark {
          color-scheme: dark;
        }
        @keyframes subtle-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-float {
            animation: subtle-float 4s ease-in-out infinite;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="color-scheme-dark">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
